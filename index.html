<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chaisha</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f9fafb;
      color: #111;
      min-height: 100vh;
    }
    header {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-size: 22px;
      font-weight: 700;
      color: #12B76A;
      text-decoration: none;
    }
    nav a {
      color: #555;
      text-decoration: none;
      margin-left: 24px;
      font-size: 14px;
    }
    nav a:hover { color: #12B76A; }
    .hero {
      max-width: 640px;
      margin: 80px auto;
      padding: 0 24px;
      text-align: center;
    }
    .hero h1 {
      font-size: 42px;
      font-weight: 700;
      color: #12B76A;
      margin-bottom: 16px;
    }
    .hero p {
      font-size: 18px;
      color: #555;
      line-height: 1.6;
      margin-bottom: 40px;
    }
    .links {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .link-card {
      display: block;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 20px 32px;
      text-decoration: none;
      color: #111;
      font-weight: 600;
      font-size: 15px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .link-card:hover {
      border-color: #12B76A;
      box-shadow: 0 0 0 3px rgba(18,183,106,0.1);
    }
    .link-card span {
      display: block;
      font-size: 12px;
      color: #888;
      font-weight: 400;
      margin-top: 4px;
    }
    footer {
      text-align: center;
      padding: 40px 24px;
      font-size: 13px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <header>
    <a class="logo" href="/">Chaisha</a>
    <nav>
      <a href="/privacy.html">Privacy Policy</a>
      <a href="/terms.html">Terms of Service</a>
    </nav>
  </header>

  <div class="hero">
    <h1>Chaisha</h1>
    <p>Your personal AI finance coach. Track budgets, crush debt, and build wealth — one conversation at a time.</p>
    <div class="links">
      <a class="link-card" href="/privacy.html">
        Privacy Policy
        <span>How we handle your data</span>
      </a>
      <a class="link-card" href="/terms.html">
        Terms of Service
        <span>Rules for using Chaisha</span>
      </a>
    </div>
  </div>

  <footer>
    &copy; 2026 Chaisha. All rights reserved.
  </footer>
</body>
</html>
